@if (isLoggedIn) {
  <nav class="navbar navbar-light bg-secondary">
    <div class="container-fluid">
      <span class="navbar-brand">GestorApp</span>

      <div class="d-flex align-items-center gap-3">
        <a class="nav-link" routerLink="/home" routerLinkActive="active">Inicio</a>

        @if (canManageUsers) {
          <a class="nav-link" routerLink="/users" routerLinkActive="active">Usuarios</a>
        }

        @if (canSeeAssignments) {
          <a class="nav-link" routerLink="/assignments" routerLinkActive="active">
            Asignaciones
          </a>
        }

        @if (canSeeTasks) {
          <a class="nav-link" routerLink="/tasks" routerLinkActive="active">
            Tareas
          </a>
        }

        @if (canSeeReports) {
          <a class="nav-link" routerLink="/reports" routerLinkActive="active">
            Reportes
          </a>
        }

        <button class="btn btn-secondary" type="button" (click)="logout()">
          Cerrar sesión
        </button>
      </div>
    </div>
  </nav>
}
